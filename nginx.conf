# Frontend Server Block
server {
    listen 80;
    server_name taskflow.fourth-coffee.shop;

    root /var/www/taskflow/frontend/dist;
    index index.html;

    # Serve Frontend (React Vite SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Backend API Server Block
server {
    listen 80;
    server_name api-taskflow.fourth-coffee.shop;

    # Proxy all requests to the Node.js server
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Pass real user IP to the backend
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
